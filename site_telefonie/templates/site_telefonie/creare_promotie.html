{% extends 'site_telefonie/baza.html' %}

{% block content %}
<div class="container" style="max-width: 600px; margin: 0 auto;">
    <h2>Creează o promoție nouă</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_nume">Nume promoție:</label>
            {{ form.nume }}
        </div>
        <div class="form-group">
            <label for="id_subiect_email">Subiect email:</label>
            {{ form.subiect_email }}
        </div>
        <div class="form-group">
            <label for="id_mesaj_email">Mesaj email:</label>
            {{ form.mesaj_email }}
        </div>
        <div class="form-group">
            <label for="id_discount">Discount (%):</label>
            {{ form.discount }}
        </div>
        <div class="form-group">
            <label for="id_data_sfarsit">Data expirare promoție:</label>
            {{ form.data_sfarsit }}
        </div>
        <div class="form-group">
            <label>Categorii pentru promoție:</label>
            {{ form.categorii }}
        </div>
        <button type="submit" class="btn btn-primary">Creează promoție</button>
    </form>
</div>
{% endblock %}
